<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soul Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        color: #fff;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }
      
      /* Fluid Aurora Background */
      .ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-color: #050505;
        overflow: hidden;
      }

      .aurora-blob {
        position: absolute;
        filter: blur(80px);
        opacity: 0.6;
        border-radius: 50%;
        animation: float 20s infinite ease-in-out alternate;
      }

      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, rgba(76, 29, 149, 0.8), transparent 70%);
        animation-delay: 0s;
      }

      .blob-2 {
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(219, 39, 119, 0.6), transparent 70%);
        animation-delay: -5s;
      }

      .blob-3 {
        top: 40%;
        left: 30%;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.5), transparent 70%);
        animation-delay: -10s;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(5%, 10%) scale(1.1);
        }
        66% {
          transform: translate(-5%, 5%) scale(0.9);
        }
        100% {
          transform: translate(0, -5%) scale(1.05);
        }
      }

      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.2);
        border-left-color: rgba(255, 255, 255, 0.2);
        border-right-color: rgba(255, 255, 255, 0.05);
        border-bottom-color: rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent; 
      }

      .animate-enter {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
        transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      
      .animate-enter.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      
      .animate-fade-in {
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .animate-fade-in.visible {
        opacity: 1;
      }

      /* ── Liquid Glass ──────────────────────────────── */
      .liquid-glass {
        background: linear-gradient(
          140deg,
          rgba(255,255,255,0.10) 0%,
          rgba(255,255,255,0.04) 50%,
          rgba(255,255,255,0.02) 100%
        );
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.18),
          inset 0 -1px 0 rgba(255,255,255,0.04),
          0 8px 32px rgba(0,0,0,0.28),
          0 1px 3px rgba(0,0,0,0.18);
      }

      .liquid-glass-btn {
        background: linear-gradient(
          150deg,
          rgba(255,255,255,0.13) 0%,
          rgba(255,255,255,0.05) 100%
        );
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.22),
          inset 0 -1px 0 rgba(255,255,255,0.05),
          0 4px 16px rgba(0,0,0,0.22);
        transition: all 0.18s ease;
      }
      .liquid-glass-btn:hover {
        background: linear-gradient(
          150deg,
          rgba(255,255,255,0.18) 0%,
          rgba(255,255,255,0.08) 100%
        );
        border-color: rgba(255,255,255,0.28);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.30),
          0 6px 20px rgba(0,0,0,0.28);
        transform: translateY(-1px);
      }
      .liquid-glass-btn:active {
        transform: scale(0.96);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.2);
      }

      /* Primary CTA glass button */
      .liquid-glass-primary {
        background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.88));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.6);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,1),
          0 8px 24px rgba(0,0,0,0.25),
          0 0 40px rgba(255,255,255,0.12);
        color: #0a0a18;
        transition: all 0.18s ease;
      }
      .liquid-glass-primary:hover {
        background: rgba(255,255,255,1);
        box-shadow: inset 0 1px 0 white, 0 10px 30px rgba(0,0,0,0.3), 0 0 50px rgba(255,255,255,0.18);
        transform: translateY(-1px);
      }
      .liquid-glass-primary:active { transform: scale(0.97); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",

</script>

</head>
  <body class="antialiased relative selection:bg-indigo-500/30 selection:text-white">
    <div class="ambient-bg">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
      <div class="aurora-blob blob-3"></div>
    </div>
